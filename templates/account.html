{% extends "layout.html" %}

{% block title %}
    Account Settings
{% endblock %}

{% block main %}
    <div class="container py-5">
        <div class="mx-auto" style="max-width: 500px;">

            <h2 class="fw-bold mb-4 text-center">Account Settings</h2>

            <div class="card shadow-sm mb-4">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold mb-3 text-start">Change Username</h5>
                    <form action="/change_username" method="post">
                        <div class="mb-3">
                            <input autocomplete="off" class="form-control" name="new_username" placeholder="New Username" type="text">
                        </div>

                        <div class="mb-3">
                            <input class="form-control" name="password" placeholder="Current Password" type="password">
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Update Username</button>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold mb-3 text-start">Change Password</h5>
                    <form action="/change_password" method="post">
                        <div class="mb-3">
                            <input class="form-control" name="current_password" placeholder="Current Password" type="password" >
                        </div>

                        <div class="mb-3">
                            <input class="form-control" name="new_password" placeholder="New Password" type="password" >
                        </div>

                        <div class="mb-3">
                            <input class="form-control" name="confirmation" placeholder="Confirm New Password" type="password" >
                        </div>

                        <button class="btn btn-danger w-100" type="submit">Update Password</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
{% endblock %}
