{% extends "layout.html" %}

{% block title %}
    Add Cash
{% endblock %}

{% block main %}
    <div class="container py-5">
        <div class="card mx-auto shadow-sm" style="max-width: 400px;">
            <div class="card-body p-4 text-center">
                <h3 class="mb-4 fw-bold">Add Cash</h3>

                <form action="/add_cash" method="post">
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input autofocus class="form-control" min="1" step="0.01" name="amount" placeholder="Amount to Add" type="number" required>
                        </div>
                        <div class="form-text text-start">Enter the amount of USD you want to add to your balance.</div>
                    </div>

                    <button class="btn btn-success w-100" type="submit">Deposit Funds</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
