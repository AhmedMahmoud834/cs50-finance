{% extends "layout.html" %}

{% block title %}
    Buy
{% endblock %}

{% block main %}
    <div class="container py-5">
        <div class="card mx-auto shadow-sm" style="max-width: 400px;">
            <div class="card-body p-4 text-center">
                <h3 class="mb-4 fw-bold">Buy Shares</h3>

                <form action="/buy" method="post">
                    <div class="mb-3">
                        <input autocomplete="off" autofocus class="form-control text-uppercase" name="symbol" placeholder="Symbol" type="text">
                    </div>

                    <div class="mb-3">
                        <input class="form-control" min="1" name="shares" placeholder="Shares" type="number">
                    </div>

                    <button class="btn btn-primary w-100" type="submit">Buy</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
